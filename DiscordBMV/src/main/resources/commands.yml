# Example
commands:
  - name: "hello"
    description: "Says hello to the user"
    context: "server"
    options:
      - name: "target"
        type: "STRING"
        description: "Who to greet"
        required: true
    conditions:
      - type: "permission"
        role_id: "<role_id(example: 1234567890123456789)>"
    actions:
      - type: "send_message"
        message: "Hello, {user}! You greeted {target}."
    fail-actions:
      - type: send_message
        message: "No Permission"

  - name: "openwebsite"
    description: "Open the website"
    ephemeral: false
    context: "both"
    actions:
      - type: send_message
        message: "Click the button below to open the site:"
      - type: button
        label: "Open the site"
        style: "LINK"
        url: "https://example.com"
        emoji: "üîó"
        disabled: false

  - name: "send-message"
    description: "Send a message with a button"
    context: "server"
    actions:
      - type: send_message
        message: "Click the button below!"
        response_type: reply
        label: "welcome_message"
      - type: button
        label: "Click Me"
        style: PRIMARY
        id: "btn_click"
        message: "You clicked the button!"

  - name: "edit-button"
    description: "Edit the button in the welcome message"
    context: "server"
    actions:
      - type: send_message
        response_type: edit_message
        target_id: "{message_id_from_previous_command}"
        message: "Updated message with a new button text"
      - type: edit_component
        target_message: "welcome_message"
        component_id: "btn_click"
        label: "Updated Button"
        style: DANGER
        disabled: false

  - name: "send-test"
    description: "Send a test message"
    context: server
    actions:
      - type: send_message
        response_type: REPLY
        message: "This is a test message."
        label: test_message

  - name: "delete-test"
    description: "Delete the test message"
    context: server
    actions:
      - type: delete_message
        label: test_message

  - name: "send-to-channel"
    description: "Send a message to a specific channel"
    context: server
    options:
      - name: channel
        type: CHANNEL
        description: The channel to send the message to
        required: true
    actions:
      - type: send_message
        response_type: SPECIFIC_CHANNEL
        target_id: "{channel}"
        message: "Hello from specific channel!"
        label: specific_message

  - name: "delete-specific"
    description: "Delete the message sent to specific channel"
    context: server
    actions:
      - type: delete_message
        label: specific_message

  - name: "feedback"
    context: server
    description: "Leave feedback about the server"
    conditions:
      - type: "permission"
        role_id: "<ID>"
    actions:
      - type: "send_form"
        form_name: "feedback-form"
      - type: "send_message"
        message: "Thanks for your feedback, {username}! You rated us {rating}/10. We'll consider your input: {review}"
        response_type: "REPLY"

  - name: "register"
    context: server
    description: "Register a new player"
    conditions:
      - type: "not_have_role"
        role_id: "<ID>"
        actions:
          - type: "send_form"
            form_name: "register-form"
          - type: "add_role"
            role_id: "<ID>"
          - type: "send_message"
            message: "Hi {nick}! Thanks for registering. Telegram: {telegram}, Accepted rules: {accept}"
            response_type: "REPLY"

  - name: "poll"
    context: server
    description: "Simple poll"
    actions:
      - type: "send_form"
        form_name: "poll-form"
      - type: "send_message"
        message: "Thanks! Favorite mode: {mode}. Would recommend: {recommend}."
        response_type: "REPLY"

  - name: "feedback_button"
    context: server
    description: "Get a button to leave feedback"
    actions:
      - type: "button"
        label: "Leave Feedback"
        style: "PRIMARY"
        form_name: "feedback-form"
        required_role: "<ID>"
        message: "Thanks for your feedback, {username}! You rated us {rating}/10. We'll consider your input: {review}"
        timeout: infinite
      - type: "send_message"
        message: "Click the button to leave feedback"
        response_type: "REPLY"

  - name: "test_4"
    context: both
    description: An example command with chance condition
    conditions:
      - type: "chance"
        percent: "10"
    actions:
      - type: "send_message"
        message: "You got lucky!"
    fail-actions:
      - type: "send_message"
        message: "You're out of luck"

  - name: "saynick"
    description: "Displays a message with the player's nickname"
    context: server
    options:
      - name: "player"
        type: "STRING"
        description: "Player's nickname"
        required: true
    actions:
      - type: "resolve_placeholders"
        template: "Hello, {player}! You entered a player's nickname. hearts %player_health%"
        player: "{player}"
      - type: "send_message"
        message: "{resolved_message}"

  - name: "user-info"
    description: "Shows information about a player"
    context: server
    options:
      - name: "target"
        type: USER
        description: "Select a player"
        required: true
    actions:
      - type: send_message
        message: |
          üë§ Name: **{user_display_name}**
          üè∑Ô∏è Tag: **{user_tag}**
          üÜî ID: `{user_id}`
          üìÜ Created: {user_create_at}
          üü¢ Status: {user_status}
          üëã Joined: {user_joined}
          üñºÔ∏è Avatar: {user_icon}
        response_type: REPLY

  - name: "page-embed"
    description: "pages"
    context: server
    options:
      - name: "page"
        type: STRING
        description: "Specify a page"
        required: false
    actions:
      - type: "send_page"
        page_id: "{option:page|1-embed}"

  - name: "page-content"
    description: "pages"
    context: server
    options:
      - name: "page"
        type: STRING
        description: "Specify a page"
        required: false
    actions:
      - type: "send_page"
        page_id: "{option:page|1-content}"